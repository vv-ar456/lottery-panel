<!DOCTYPE html>
<html>
<head>
<title>Retailer Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h2>Retailer Login</h2>
<div id="loginBox">
<input id="mobile" placeholder="Mobile"><br>
<input id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">

<h3>Dashboard</h3>
Assigned: <span id="assigned"></span><br>
Sold: <span id="sold"></span><br>
Remaining: <span id="remaining"></span><br>
Earning: ₹<span id="earning"></span><br><br>

<h3>My Assigned Tickets</h3>
<div id="myTickets"></div>

<h3>Sell Tickets (Max 10)</h3>
<input id="customerName" placeholder="Customer Name"><br>
<input id="customerMobile" placeholder="Customer Mobile"><br>
<textarea id="bulkSell" placeholder="Enter ticket numbers comma separated"></textarea><br>
<button onclick="bulkSell()">Sell Tickets</button>

</div>

<script>

const client = window.supabase.createClient(
"https://xgcegevvccpjvcjbuyfa.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnY2VnZXZ2Y2NwanZjamJ1eWZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTkwMjgsImV4cCI6MjA4Nzg5NTAyOH0.-k2CKY0GB389tH0EGSpIncsG2R6A8H3Zaxehw265-Ic"
);

let currentMobile="";

async function login(){

let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;

let {data}=await client.from("retailers").select("*")
.eq("mobile",mobile).eq("password",password).single();

if(!data){alert("Invalid");return;}

currentMobile=mobile;
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

updateDashboard();
loadMyTickets();
}

async function updateDashboard(){
let {data}=await client.from("retailers")
.select("*").eq("mobile",currentMobile).single();

document.getElementById("assigned").innerText=data.assigned;
document.getElementById("sold").innerText=data.sold;
document.getElementById("remaining").innerText=data.remaining;
document.getElementById("earning").innerText=data.earning;
}

async function loadMyTickets(){
let {data}=await client.from("tickets")
.select("*").eq("retailer_mobile",currentMobile)
.eq("status","assigned");

let list="";
data.forEach(t=>{list+=t.ticket_no+" , ";});
document.getElementById("myTickets").innerText=list;
}

async function bulkSell(){

let tickets=document.getElementById("bulkSell").value.split(",");
if(tickets.length>10){alert("Max 10 allowed");return;}

let cname=document.getElementById("customerName").value;
let cmobile=document.getElementById("customerMobile").value;

for(let t of tickets){

t=t.trim();

let {data}=await client.from("tickets")
.select("*").eq("ticket_no",t)
.eq("retailer_mobile",currentMobile).single();

if(!data || data.status!="assigned") continue;

await client.from("tickets").update({
status:"sold",
customer_name:cname,
customer_mobile:cmobile
}).eq("ticket_no",t);

let {data:r}=await client.from("retailers")
.select("*").eq("mobile",currentMobile).single();

await client.from("retailers").update({
sold:r.sold+1,
remaining:r.remaining-1,
earning:r.earning+data.price
}).eq("mobile",currentMobile);
}

updateDashboard();
loadMyTickets();
alert("Tickets Sold");
}

</script>
</body>
</html>
