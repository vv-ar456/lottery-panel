<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verified Victory | Pro Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: #050b14; color: white; text-align: center; padding: 20px; }
        
        /* Logo aur Header */
        .logo { width: 100%; max-width: 220px; margin: 20px 0; }
        
        /* Scanner Area - Iska size fixed rakha hai */
        #reader { 
            width: 100%; max-width: 350px; 
            margin: 0 auto 20px auto; 
            border: 2px solid #ffd700; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000;
        }

        /* Buttons & Inputs - Ek ke niche ek (Full Width) */
        .controls { width: 100%; max-width: 350px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        
        .ticket-box { 
            width: 100%; padding: 15px; font-size: 22px; font-weight: bold;
            background: #111d2f; border: 2px solid #ffd700; border-radius: 10px;
            color: #ffd700; text-align: center; text-transform: uppercase;
        }

        .btn { width: 100%; padding: 18px; font-size: 16px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-scan { background: #ffd700; color: #000; }
        .btn-stop { background: #ef4444; color: white; display: none; }
        .btn-save { background: #1e293b; color: white; border: 1px solid #334155; }

        #status { margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <img src="1000102234-removebg-preview.png" class="logo" alt="Verified Victory" onerror="this.style.display='none'">

    <div id="reader"></div>

    <div class="controls">
        <button id="startBtn" class="btn btn-scan" onclick="startCamera()">📷 Start Scanner</button>
        <button id="stopBtn" class="btn btn-stop" onclick="stopCamera()">❌ Close Camera</button>

        <input type="text" id="ticketInput" class="ticket-box" placeholder="AA001">
        
        <button class="btn btn-save" onclick="manualSave()">💾 Save Ticket</button>
    </div>

    <div id="status"></div>

    <script>
        // Supabase Setup
        const SUPABASE_URL = 'https://mpsshowyrgbehjoffieh.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wc3Nob3d5cmdiZWhqb2ZmaWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDA3MTUsImV4cCI6MjA4ODAxNjcxNX0.4nHVtR5edrXUjsIi_2-L8OD66ATZ9ITWT3l--nVlX6I'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const validDb = Array.from({length: 100}, (_, i) => 'AA' + String(i + 1).padStart(3, '0'));
        let scanner = null;

        // CAMERA START (Pure Javascript - No interference)
        async function startCamera() {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';

            scanner = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 150 } };

            try {
                await scanner.start({ facingMode: "environment" }, config, (decodedText) => {
                    document.getElementById('ticketInput').value = decodedText.trim().toUpperCase();
                    try { new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play(); } catch(e){}
                    
                    // Auto-Save after scan
                    saveData(decodedText.trim().toUpperCase());
                });
            } catch (err) {
                alert("Camera Error: Please use Chrome/Safari and Allow Permissions.");
                stopCamera();
            }
        }

        function stopCamera() {
            if (scanner) {
                scanner.stop().then(() => {
                    scanner.clear();
                    document.getElementById('reader').style.display = 'none';
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                }).catch(e => console.log(e));
            }
        }

        function manualSave() {
            const val = document.getElementById('ticketInput').value.trim().toUpperCase();
            if(val) saveData(val);
        }

        // DATA SAVE LOGIC
        async function saveData(ticket) {
            const status = document.getElementById('status');
            
            if (!validDb.includes(ticket)) {
                alert("❌ Invalid Ticket: " + ticket);
                return;
            }

            status.innerText = "⏳ Saving...";
            status.style.display = "block";
            status.style.color = "#ffd700";

            try {
                const { error } = await supabase.from('scanned_tickets').insert([{ ticket_number: ticket }]);
                if (error) throw error;

                status.innerText = "✅ Saved: " + ticket;
                status.style.color = "#28a745";
                document.getElementById('ticketInput').value = "";
                
                // Camera band kar do scan ke baad (UX fix)
                stopCamera();
                
                setTimeout(() => { status.style.display = "none"; }, 3000);
            } catch (err) {
                alert("Database Error! Table 'scanned_tickets' check karein.");
                status.style.display = "none";
            }
        }
    </script>
</body>
</html>
