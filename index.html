<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verified Victory | Auto-Submit Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* PREMIUM DARK UI */
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(135deg, #050b14, #132b4a); 
            color: white; min-height: 100vh; display: flex; 
            justify-content: center; align-items: center; padding: 15px;
        }

        .card {
            width: 100%; max-width: 400px; background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo { width: 100%; max-width: 200px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); }

        .step { display: none; animation: fadeIn 0.4s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .title { color: #ffd700; font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* INPUTS */
        .input-box {
            width: 100%; padding: 20px 15px; font-size: 1.5rem; font-weight: 900;
            background: rgba(0,0,0,0.3); border: 2px solid #ffd700; 
            border-radius: 10px; color: #ffd700; margin-bottom: 15px;
            text-align: center; outline: none; text-transform: uppercase;
            letter-spacing: 2px;
        }
        .input-box:focus { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .input-box::placeholder { color: rgba(255,255,255,0.2); font-size: 1rem; font-weight: normal; letter-spacing: normal; }

        .normal-input {
            width: 100%; padding: 15px; font-size: 1.1rem; font-weight: bold;
            background: rgba(0,0,0,0.3); border: 2px solid #334155; 
            border-radius: 10px; color: #ffd700; margin-bottom: 15px;
            text-align: center; outline: none; text-transform: uppercase;
        }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 15px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-gold { background: linear-gradient(90deg, #d4af37, #ffdf00); color: #000; box-shadow: 0 4px 15px rgba(255,215,0,0.3); }
        .btn-dark { background: #334155; color: white; border: 1px solid #475569; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        .ticket-list { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .badge { background: rgba(255,215,0,0.1); border: 1px solid #ffd700; color: #ffd700; padding: 8px 15px; border-radius: 8px; font-weight: bold; }

        .photo-preview { width: 100%; height: 200px; border-radius: 10px; object-fit: cover; display: none; margin-bottom: 15px; border: 2px solid #28a745; }
        .hidden-file { display: none; }

        /* LIVE SCANNER OVERLAY */
        #scanner-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #reader { width: 100%; max-width: 350px; background: #fff; border-radius: 15px; overflow: hidden; border: 3px solid #ffd700; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        .loader { border: 5px solid rgba(255,215,0,0.2); border-top: 5px solid #ffd700; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .overlay-text { color: #ffd700; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="loader"></div>
        <div class="overlay-text" id="overlay-msg">Processing...</div>
    </div>

    <div id="scanner-modal">
        <h3 style="color: #ffd700; margin-bottom: 15px;">📷 Auto-Scan Barcode</h3>
        <div id="reader"></div>
        <button class="btn btn-danger" style="max-width: 250px; margin-top: 20px;" onclick="stopLiveScanner()">❌ Cancel Scan</button>
    </div>

    <div class="card">
        <img src="1000102234-removebg-preview.png" class="logo" alt="Verified Victory" onerror="this.style.display='none'">

        <div id="step1" class="step active">
            <div class="title">Step 1: Enter Ticket</div>
            
            <button class="btn btn-gold" onclick="startLiveScanner('ticket1')">📷 OPEN LIVE SCANNER</button>
            
            <div style="margin: 15px 0; color: #64748b; font-weight: bold;">OR TYPE BELOW</div>

            <input type="text" id="manualTicket1" class="input-box" placeholder="AA001" oninput="checkAutoSubmit(this)">
        </div>

        <div id="step2" class="step">
            <div class="title">Step 2: Scanned (<span id="ticketCount">1</span>/10)</div>
            
            <div class="ticket-list" id="ticketBadgeContainer"></div>

            <button class="btn btn-dark" id="addMoreBtn" onclick="startLiveScanner('more')">➕ LIVE SCAN MORE</button>
            
            <input type="text" id="manualTicketMore" class="input-box" style="margin-top:10px; font-size: 1rem; padding: 10px;" placeholder="OR TYPE MORE (AA002)" oninput="checkAutoSubmit(this)">

            <button class="btn btn-gold" onclick="goToStep3()">⏭️ DONE / NEXT STEP</button>
        </div>

        <div id="step3" class="step">
            <div class="title">Step 3: Customer Details</div>
            
            <div style="color: #ffd700; font-weight: bold; font-size: 1.3rem; margin-bottom: 15px;">
                Total Amount: <span id="totalAmountText">₹0</span>
            </div>

            <input type="text" id="custName" class="normal-input" placeholder="CUSTOMER NAME">
            <input type="tel" id="custPhone" class="normal-input" placeholder="10-DIGIT MOBILE NO." maxlength="10">

            <img id="photoPreview" class="photo-preview">

            <input type="file" id="customerFaceFile" class="hidden-file" accept="image/*" capture="user" onchange="previewCustomerPhoto(event)">
            <button class="btn btn-dark" id="captureFaceBtn" onclick="document.getElementById('customerFaceFile').click()">📸 TAKE CUSTOMER PHOTO</button>

            <button class="btn btn-success" onclick="submitFinalData()">🚀 SUBMIT & SAVE</button>
        </div>

    </div>

    <script>
        // SUPABASE SETUP
        const SUPABASE_URL = 'https://mpsshowyrgbehjoffieh.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wc3Nob3d5cmdiZWhqb2ZmaWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDA3MTUsImV4cCI6MjA4ODAxNjcxNX0.4nHVtR5edrXUjsIi_2-L8OD66ATZ9ITWT3l--nVlX6I'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const validDb = Array.from({length: 100}, (_, i) => 'AA' + String(i + 1).padStart(3, '0'));
        const TICKET_PRICE = 20;

        let selectedTickets = [];
        let customerPhotoBlob = null;
        let liveScanner = null;

        // --- UI NAVIGATION ---
        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        // --- THE MAGIC: AUTO SUBMIT ON TYPING ---
        function checkAutoSubmit(inputElement) {
            let val = inputElement.value.trim().toUpperCase();
            
            // Check if length is 5 and it exists in valid Database
            if (val.length === 5 && validDb.includes(val)) {
                inputElement.value = ""; // Clear box immediately
                processTicket(val);      // Send to next step
            }
        }

        // --- LIVE SCANNER ---
        function startLiveScanner(context) {
            document.getElementById('scanner-modal').style.display = 'flex';
            liveScanner = new Html5Qrcode("reader");
            
            liveScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 100 } },
                (decodedText) => {
                    const tk = decodedText.trim().toUpperCase();
                    if(validDb.includes(tk)) {
                        stopLiveScanner(); 
                        processTicket(tk); 
                    }
                },
                (err) => {}
            ).catch(err => {
                alert("⚠️ Camera Blocked! Allow permissions in Browser.");
                stopLiveScanner();
            });
        }

        function stopLiveScanner() {
            document.getElementById('scanner-modal').style.display = 'none';
            if (liveScanner) {
                liveScanner.stop().then(() => liveScanner.clear()).catch(e=>{});
                liveScanner = null;
            }
        }

        // --- TICKET PROCESSING ---
        function processTicket(tk) {
            if (selectedTickets.includes(tk)) return alert("⚠️ Ticket already added!");
            
            if (selectedTickets.length >= 10) {
                alert("Maximum 10 tickets allowed!");
                return;
            }

            // Successfully added
            selectedTickets.push(tk);
            try { new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play(); } catch(e){}

            updateTicketList();
            showStep('step2');
        }

        function updateTicketList() {
            const container = document.getElementById('ticketBadgeContainer');
            document.getElementById('ticketCount').innerText = selectedTickets.length;
            
            container.innerHTML = "";
            selectedTickets.forEach(tk => {
                container.innerHTML += `<div class="badge">${tk}</div>`;
            });

            if (selectedTickets.length >= 10) {
                document.getElementById('addMoreBtn').style.display = 'none';
                document.getElementById('manualTicketMore').style.display = 'none';
            }
        }

        function goToStep3() {
            if(selectedTickets.length === 0) return alert("Please add at least 1 ticket.");
            document.getElementById('totalAmountText').innerText = `₹${selectedTickets.length * TICKET_PRICE}`;
            showStep('step3');
        }

        // --- CUSTOMER PHOTO ---
        function previewCustomerPhoto(event) {
            if (!event.target.files || event.target.files.length === 0) return;
            const file = event.target.files[0];
            customerPhotoBlob = file;

            const preview = document.getElementById('photoPreview');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';

            document.getElementById('captureFaceBtn').innerText = "🔄 RETAKE PHOTO";
        }

        // --- FINAL SUBMISSION ---
        async function submitFinalData() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();

            if (!name) return alert("⚠️ Enter Customer Name.");
            if (phone.length !== 10) return alert("⚠️ Enter 10-Digit Mobile Number.");
            if (!customerPhotoBlob) return alert("⚠️ Customer Photo is required!");

            document.getElementById('overlay-msg').innerText = "Uploading Photo...";
            document.getElementById('overlay').style.display = 'flex';

            try {
                // Upload Photo
                const fileName = `photo_${Date.now()}.jpg`;
                const { error: uploadError } = await supabase.storage
                    .from('customer_photos')
                    .upload(fileName, customerPhotoBlob, { contentType: 'image/jpeg' });

                if (uploadError) throw new Error("Photo upload failed.");

                document.getElementById('overlay-msg').innerText = "Saving Data...";

                // Get Public URL
                const { data: publicUrlData } = supabase.storage
                    .from('customer_photos')
                    .getPublicUrl(fileName);

                // Save to 'purchases' table
                const { error: dbError } = await supabase
                    .from('purchases')
                    .insert([{ 
                        customer_name: name, 
                        customer_phone: phone, 
                        tickets: selectedTickets.join(', '), 
                        total_amount: `₹${selectedTickets.length * TICKET_PRICE}`, 
                        photo_url: publicUrlData.publicUrl
                    }]);

                if (dbError) throw new Error("Database error.");

                // Success
                document.getElementById('overlay').style.display = 'none';
                alert("🎉 SUCCESS! Purchase Saved.");
                window.location.reload(); 

            } catch (err) {
                document.getElementById('overlay').style.display = 'none';
                alert(`❌ ERROR: ${err.message}`);
            }
        }
    </script>
</body>
</html>
