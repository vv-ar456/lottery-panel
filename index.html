<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verified Victory</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.page{
  display:none;
  background:white;
  width:380px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}
.active{ display:block; }
input,button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  background:#2a5298;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{ background:#1e3c72; }
.logo{ width:100%; margin-bottom:20px; }
.total{ font-weight:bold; color:green; }
#preview{ width:100%; border-radius:10px; margin-top:10px; }
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<img src="logo.png" class="logo">
<h3>Scan Ticket</h3>
<input type="text" id="firstTicket" autofocus placeholder="Scan Ticket">
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<h3>Add More Tickets</h3>
<input type="text" id="moreTicket" placeholder="Scan Ticket">
<div id="ticketList"></div>
<div class="total">Total Tickets: <span id="count">1</span></div>
<button onclick="goToPage3()">Skip</button>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<h3>Customer Details</h3>
<input type="text" id="name" placeholder="Customer Name">
<input type="text" id="phone" placeholder="Customer Phone">

<h4>Capture Photo</h4>
<video id="video" width="100%" autoplay></video>
<button onclick="capture()">Capture</button>
<img id="preview">

<button onclick="submit()">Submit</button>
</div>

<script>
const supabase = window.supabase.createClient(
'https://xgcegevvccpjvcjbuyfa.supabase.co',
'your-anon-key-here'
);

let tickets=[];
let photoBlob=null;

function validTicket(ticket){
 return /^AA(0[0-9][0-9]|100)$/.test(ticket);
}

function showPage(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

/* PAGE 1 AUTO PROCESS */
document.getElementById("firstTicket").addEventListener("input",function(){
 let value=this.value.toUpperCase();
 if(value.length==5){
   if(validTicket(value)){
     tickets.push(value);
     document.getElementById("count").innerText=tickets.length;
     showPage("page2");
   }else{
     alert("Invalid Ticket");
   }
   this.value="";
 }
});

/* PAGE 2 AUTO ADD */
document.getElementById("moreTicket").addEventListener("input",function(){
 let value=this.value.toUpperCase();
 if(value.length==5){
   if(!validTicket(value)){
     alert("Invalid Ticket");
   }
   else if(tickets.includes(value)){
     alert("Already Added");
   }
   else if(tickets.length>=10){
     alert("Max 10 tickets allowed");
   }
   else{
     tickets.push(value);
     document.getElementById("ticketList").innerHTML=tickets.join(", ");
     document.getElementById("count").innerText=tickets.length;
   }
   this.value="";
 }
});

function goToPage3(){
 showPage("page3");
}

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
 document.getElementById("video").srcObject=stream;
});

function capture(){
 let video=document.getElementById("video");
 let canvas=document.createElement("canvas");
 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;
 canvas.getContext("2d").drawImage(video,0,0);
 canvas.toBlob(blob=>{
   photoBlob=blob;
   document.getElementById("preview").src=URL.createObjectURL(blob);
 });
}

/* SUBMIT */
async function submit(){

 if(!photoBlob){
   alert("Capture Photo");
   return;
 }

 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;

 if(!name || !phone){
   alert("Fill all details");
   return;
 }

 for(let ticket of tickets){
   const {data}=await supabase
   .from("tickets")
   .select("id")
   .eq("ticket_number",ticket);

   if(data.length>0){
     alert(ticket+" already sold");
     return;
   }
 }

 const fileName=Date.now()+".png";
 await supabase.storage.from("photos").upload(fileName,photoBlob);

 const {data:publicUrl}=supabase
 .storage.from("photos")
 .getPublicUrl(fileName);

 for(let ticket of tickets){
   await supabase.from("tickets").insert({
     ticket_number:ticket,
     customer_name:name,
     customer_phone:phone,
     customer_photo:publicUrl.data.publicUrl
   });
 }

 alert("Success ✅");
 location.reload();
}
</script>

</body>
</html>
