<!DOCTYPE html>
<html>
<head>
<title>Retailer Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
}
.card{
background:white;
padding:20px;
margin:40px auto;
width:320px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
}
input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}
button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
.dashboard{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}
.box{
background:white;
padding:20px;
width:150px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}
h3{margin:0;font-size:22px;}
</style>
</head>
<body>

<div class="card" id="loginBox">
<h2>Retailer Login</h2>
<input id="mobile" placeholder="Mobile"><br>
<input id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<div id="dashboard" style="display:none;">
<h2>Retailer Dashboard</h2>

<div class="dashboard">
<div class="box">
<h3 id="assigned">0</h3>
<p>Assigned</p>
</div>

<div class="box">
<h3 id="sold">0</h3>
<p>Sold</p>
</div>

<div class="box">
<h3 id="remaining">0</h3>
<p>Remaining</p>
</div>

<div class="box">
<h3 id="earning">0</h3>
<p>Earning ₹</p>
</div>
</div>

<br>
<button onclick="logout()">Logout</button>
</div>

<script>

const client = window.supabase.createClient(
"https://xgcegevvccpjvcjbuyfa.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnY2VnZXZ2Y2NwanZjamJ1eWZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTkwMjgsImV4cCI6MjA4Nzg5NTAyOH0.-k2CKY0GB389tH0EGSpIncsG2R6A8H3Zaxehw265-Ic"
);

async function login(){

let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;

const {data,error}=await client
.from("retailers")
.select("*")
.eq("mobile",mobile)
.eq("password",password)
.single();

if(error || !data){
document.getElementById("msg").innerText="Invalid Login";
return;
}

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("assigned").innerText=data.assigned;
document.getElementById("sold").innerText=data.sold;
document.getElementById("remaining").innerText=data.remaining;
document.getElementById("earning").innerText=data.earning;

}

function logout(){
location.reload();
}

</script>
</body>
</html>
