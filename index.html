<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verified Victory | Pro Scanner</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        /* MOBILE-FIRST BULLETPROOF DESIGN */
        body { 
            background: #050b14; color: white; font-family: sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
        }

        .logo { width: 100%; max-width: 240px; margin: 20px 0; filter: drop-shadow(0 0 10px rgba(255,215,0,0.3)); }

        /* Scanner Box - Stylish & Responsive */
        #reader { 
            width: 100%; max-width: 380px; border-radius: 15px; overflow: hidden; 
            border: 2px solid #ffd700; background: #000; margin-bottom: 20px;
        }

        /* Library UI Elements Styling (To make it look modern) */
        #reader__dashboard_section_csr button {
            background: #ffd700 !important; color: #000 !important; 
            border: none !important; padding: 12px 20px !important; 
            border-radius: 8px !important; font-weight: bold !important; cursor: pointer !important;
            margin: 10px 0 !important; width: 100% !important;
        }
        #reader__scan_region { background: white !important; }

        .input-box {
            width: 100%; max-width: 380px; padding: 15px; font-size: 22px; 
            background: rgba(255,255,255,0.1); border: 2px solid #ffd700; 
            border-radius: 12px; color: #ffd700; font-weight: bold; 
            text-align: center; margin-bottom: 15px; outline: none; text-transform: uppercase;
        }

        .btn-submit {
            width: 100%; max-width: 380px; padding: 16px; background: #ffd700; 
            color: #000; border: none; border-radius: 12px; font-size: 18px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }

        #status { font-weight: bold; margin-top: 15px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .pending { background: rgba(255, 215, 0, 0.2); color: #ffd700; }
    </style>
</head>
<body>

    <img src="1000102234-removebg-preview.png" class="logo" alt="Verified Victory" onerror="this.style.display='none'">

    <div id="reader"></div>

    <input type="text" id="ticketNo" class="input-box" placeholder="TICKET NO. (AA001)">

    <button class="btn-submit" onclick="manualSubmit()">Save Ticket</button>

    <div id="status"></div>

    <script>
        // SUPABASE SETUP
        const SUPABASE_URL = 'https://mpsshowyrgbehjoffieh.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wc3Nob3d5cmdiZWhqb2ZmaWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDA3MTUsImV4cCI6MjA4ODAxNjcxNX0.4nHVtR5edrXUjsIi_2-L8OD66ATZ9ITWT3l--nVlX6I'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Valid AA001 to AA100 List
        const validTickets = Array.from({length: 100}, (_, i) => 'AA' + String(i + 1).padStart(3, '0'));

        // SCANNER INITIALIZATION
        // Is method mein camera permissions library khud manage karti hai
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 10, 
                qrbox: { width: 250, height: 150 },
                aspectRatio: 1.0 
            }, 
            /* verbose= */ false
        );

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        function onScanSuccess(decodedText) {
            const ticket = decodedText.trim().toUpperCase();
            document.getElementById('ticketNo').value = ticket;
            
            // Beep Sound
            try { new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play(); } catch(e){}

            // AUTO SUBMIT
            saveData(ticket);
        }

        function onScanFailure(error) {
            // Scanning errors ignore karein
        }

        // MANUAL SUBMIT
        function manualSubmit() {
            const ticket = document.getElementById('ticketNo').value.trim().toUpperCase();
            if (!ticket) return alert("Please enter a ticket number.");
            saveData(ticket);
        }

        // DATABASE SAVE LOGIC
        async function saveData(ticket) {
            const statusDiv = document.getElementById('status');
            
            // Validation
            if (!validTickets.includes(ticket)) {
                alert("❌ Error: Invalid Ticket Number (" + ticket + ")");
                return;
            }

            // Show Saving State
            statusDiv.innerText = "⏳ Saving to Database...";
            statusDiv.className = "pending";
            statusDiv.style.display = "block";

            try {
                const { error } = await supabase
                    .from('scanned_tickets')
                    .insert([{ ticket_number: ticket }]);

                if (error) throw error;

                // Success
                statusDiv.innerText = "✅ Successfully Saved: " + ticket;
                statusDiv.className = "success";
                document.getElementById('ticketNo').value = ""; // Clear input
                
                // Refresh status after 3 seconds
                setTimeout(() => { statusDiv.style.display = "none"; }, 3000);

            } catch (err) {
                console.error(err);
                alert("❌ Database Error! Check your Supabase table name.");
                statusDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
