<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verified Victory | Quick Scan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        /* EK DUM SIMPLE AUR BADA DESIGN (MOBILE FRIENDLY) */
        body { 
            background: #0b1423; color: white; font-family: Arial, sans-serif; 
            text-align: center; padding: 20px; margin: 0;
        }

        .logo { width: 100%; max-width: 250px; margin-bottom: 30px; }

        .box { 
            width: 100%; max-width: 350px; padding: 15px; font-size: 20px; 
            text-align: center; border-radius: 10px; border: 2px solid #ffd700; 
            margin-bottom: 20px; background: #1a2535; color: #ffd700; font-weight: bold; text-transform: uppercase;
        }

        .btn { 
            width: 100%; max-width: 350px; padding: 18px; font-size: 18px; 
            font-weight: bold; border-radius: 10px; border: none; 
            margin-bottom: 15px; cursor: pointer; display: block; margin-left: auto; margin-right: auto;
        }
        
        .btn-cam { background: #334155; color: white; border: 1px solid #64748b; }
        .btn-sub { background: #ffd700; color: #000; }
        .btn-close { background: #ef4444; color: white; display: none; }

        /* Scanner Area */
        #reader { 
            width: 100%; max-width: 350px; margin: 0 auto 20px auto; 
            display: none; background: white; color: black; border-radius: 10px; overflow: hidden; 
        }

        #msg { font-size: 18px; font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <img src="1000102234-removebg-preview.png" class="logo" alt="Verified Victory" onerror="this.style.display='none'">
    
    <div id="reader"></div>

    <button class="btn btn-cam" id="camBtn" onclick="startScanner()">📷 START BARCODE SCANNER</button>
    <button class="btn btn-close" id="closeCamBtn" onclick="stopScanner()">❌ CLOSE CAMERA</button>

    <input type="text" id="ticketNumber" class="box" placeholder="TYPE TICKET NO. (AA001)">
    
    <button class="btn btn-sub" onclick="saveData()">💾 SUBMIT TICKET</button>

    <div id="msg"></div>

    <script>
        // Supabase Settings
        const SUPABASE_URL = 'https://mpsshowyrgbehjoffieh.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wc3Nob3d5cmdiZWhqb2ZmaWVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NDA3MTUsImV4cCI6MjA4ODAxNjcxNX0.4nHVtR5edrXUjsIi_2-L8OD66ATZ9ITWT3l--nVlX6I'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Generate AA001 to AA100
        const validDb = Array.from({length: 100}, (_, i) => 'AA' + String(i + 1).padStart(3, '0'));

        let scanner = null;

        // 1. SCANNER CHALU KARNA
        function startScanner() {
            document.getElementById('reader').style.display = 'block';
            document.getElementById('camBtn').style.display = 'none';
            document.getElementById('closeCamBtn').style.display = 'block';

            // Library ka in-built stable scanner use kiya hai
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 100} }, false);
            scanner.render(onScanSuccess, onScanFailure);
        }

        // 2. SCAN HOTE HI (AUTO SUBMIT)
        function onScanSuccess(text) {
            document.getElementById('ticketNumber').value = text.trim().toUpperCase();
            
            // Beep sound
            try { new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3').play(); } catch(e){}
            
            stopScanner(); // Camera band karo
            saveData();    // Submit function bula lo
        }

        function onScanFailure(err) {
            // Background errors ignore karo
        }

        // 3. SCANNER BAND KARNA
        function stopScanner() {
            if(scanner) {
                scanner.clear();
                scanner = null;
            }
            document.getElementById('reader').style.display = 'none';
            document.getElementById('camBtn').style.display = 'block';
            document.getElementById('closeCamBtn').style.display = 'none';
        }

        // 4. DATA SAVE KARNA
        async function saveData() {
            const tk = document.getElementById('ticketNumber').value.trim().toUpperCase();
            const msgBox = document.getElementById('msg');
            
            if(!tk) { alert("⚠️ Please enter a ticket."); return; }
            if(!validDb.includes(tk)) { alert("❌ Invalid Ticket: " + tk); return; }

            // Loading dikhao
            msgBox.innerText = "⏳ Saving...";
            msgBox.style.color = "#ffd700";
            msgBox.style.display = "block";

            try {
                const { error } = await supabase.from('scanned_tickets').insert([{ ticket_number: tk }]);
                if(error) throw error;
                
                // Success ho gaya
                document.getElementById('ticketNumber').value = ""; // Agle ke liye khali
                msgBox.innerText = "✅ Saved Successfully!";
                msgBox.style.color = "#28a745";
                
                setTimeout(() => { msgBox.style.display = 'none'; }, 2000);
            } catch(e) {
                msgBox.style.display = 'none';
                alert("❌ Database Error! Please check Supabase table.");
                console.log(e);
            }
        }
    </script>
</body>
</html>
