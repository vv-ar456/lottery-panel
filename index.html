<!DOCTYPE html>
<html>
<head>
<title>Retailer Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Retailer Login</h2>

<div id="loginBox">
<input id="mobile" placeholder="Mobile"><br><br>
<input id="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">
<h3>Dashboard</h3>
Assigned: <span id="assigned"></span><br>
Sold: <span id="sold"></span><br>
Remaining: <span id="remaining"></span><br>
Earning: ₹<span id="earning"></span><br><br>
<button onclick="logout()">Logout</button>
</div>

<p id="msg"></p>

<script>

const client = window.supabase.createClient(
"PASTE_YOUR_PROJECT_URL",
"PASTE_YOUR_ANON_KEY"
);

async function login(){

let mobile = document.getElementById("mobile").value;
let password = document.getElementById("password").value;

const {data,error} = await client
.from("retailers")
.select("*")
.eq("mobile",mobile)
.eq("password",password)
.single();

if(error || !data){
document.getElementById("msg").innerText="Invalid Login";
return;
}

document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="block";

document.getElementById("assigned").innerText=data.assigned;
document.getElementById("sold").innerText=data.sold;
document.getElementById("remaining").innerText=data.remaining;
document.getElementById("earning").innerText=data.earning;
}

function logout(){
location.reload();
}

</script>
</body>
</html>
