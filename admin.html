<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#f4f6f9;text-align:center;}
.card{background:white;padding:20px;margin:20px auto;width:400px;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.1);}
input,textarea{width:95%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button{padding:8px 15px;background:#28a745;color:white;border:none;border-radius:6px;cursor:pointer;}
table{width:95%;margin:20px auto;border-collapse:collapse;background:white;}
th,td{padding:8px;border:1px solid #ddd;}
th{background:#007bff;color:white;}
</style>
</head>
<body>

<div class="card">
<h3>Change Ticket Price</h3>
<input id="newPrice" placeholder="New Price">
<button onclick="changePrice()">Update Price</button>
<p id="priceMsg"></p>
</div>

<div class="card">
<h3>Bulk Assign Tickets</h3>
<textarea id="bulkTickets" placeholder="Enter ticket numbers comma separated"></textarea>
<input id="retailerMobile" placeholder="Retailer Mobile">
<button onclick="bulkAssign()">Assign</button>
<p id="assignMsg"></p>
</div>

<h3>All Tickets</h3>
<table id="ticketTable"></table>

<script>

const client = window.supabase.createClient(
"https://xgcegevvccpjvcjbuyfa.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnY2VnZXZ2Y2NwanZjamJ1eWZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMTkwMjgsImV4cCI6MjA4Nzg5NTAyOH0.-k2CKY0GB389tH0EGSpIncsG2R6A8H3Zaxehw265-Ic"
);

async function changePrice(){
let price=document.getElementById("newPrice").value;
await client.from("settings").update({ticket_price:price}).eq("id",1);
document.getElementById("priceMsg").innerText="Price Updated";
}

async function bulkAssign(){

let tickets=document.getElementById("bulkTickets").value.split(",");
let mobile=document.getElementById("retailerMobile").value;

for(let t of tickets){

t=t.trim();

let {data}=await client.from("tickets")
.select("*").eq("ticket_no",t).single();

if(data && data.status!="sold"){
continue; // skip if already assigned
}

let {data:priceData}=await client.from("settings").select("*").single();

await client.from("tickets").insert([{
ticket_no:t,
retailer_mobile:mobile,
status:"assigned",
price:priceData.ticket_price
}]);

let {data:r}=await client.from("retailers").select("*")
.eq("mobile",mobile).single();

await client.from("retailers").update({
assigned:r.assigned+1,
remaining:r.remaining+1
}).eq("mobile",mobile);

}

document.getElementById("assignMsg").innerText="Bulk Assign Completed";
loadTickets();
}

async function deleteTicket(id){

let {data}=await client.from("tickets").select("*")
.eq("id",id).single();

if(data.status!="sold"){
await client.from("tickets").delete().eq("id",id);

let {data:r}=await client.from("retailers").select("*")
.eq("mobile",data.retailer_mobile).single();

await client.from("retailers").update({
assigned:r.assigned-1,
remaining:r.remaining-1
}).eq("mobile",data.retailer_mobile);
}

loadTickets();
}

async function loadTickets(){

let {data}=await client.from("tickets").select("*");

let table=document.getElementById("ticketTable");

table.innerHTML="<tr><th>No</th><th>Retailer</th><th>Status</th><th>Price</th><th>Action</th></tr>";

data.forEach(t=>{
table.innerHTML+=`
<tr>
<td>${t.ticket_no}</td>
<td>${t.retailer_mobile}</td>
<td>${t.status}</td>
<td>${t.price}</td>
<td><button onclick="deleteTicket(${t.id})">Delete</button></td>
</tr>`;
});
}

loadTickets();

</script>
</body>
</html>
