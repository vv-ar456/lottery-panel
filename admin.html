<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Add Retailer</h2>

<input id="name" placeholder="Name"><br><br>
<input id="mobile" placeholder="Mobile"><br><br>
<input id="password" placeholder="Password"><br><br>

<button onclick="addRetailer()">Add Retailer</button>

<h3>Retailers List</h3>
<table border="1" id="table"></table>

<p id="msg"></p>

<script>

const client = window.supabase.createClient(
"PASTE_YOUR_PROJECT_URL",
"PASTE_YOUR_ANON_KEY"
);

async function addRetailer(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let password=document.getElementById("password").value;

const {error}=await client
.from("retailers")
.insert([{name,mobile,password,assigned:0,sold:0,remaining:0,earning:0}]);

if(error){
document.getElementById("msg").innerText="Error";
}else{
document.getElementById("msg").innerText="Retailer Added";
loadRetailers();
}
}

async function loadRetailers(){

const {data}=await client.from("retailers").select("*");

let table=document.getElementById("table");

table.innerHTML="<tr><th>Name</th><th>Mobile</th><th>Assigned</th><th>Sold</th><th>Remaining</th><th>Earning</th></tr>";

data.forEach(r=>{
table.innerHTML+=`<tr>
<td>${r.name}</td>
<td>${r.mobile}</td>
<td>${r.assigned}</td>
<td>${r.sold}</td>
<td>${r.remaining}</td>
<td>${r.earning}</td>
</tr>`;
});
}

loadRetailers();

</script>
</body>
</html>
